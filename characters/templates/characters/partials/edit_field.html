<form class="inline-form"
      hx-post="/character/{{ character_id }}/update-field/"
      hx-target="#section-{{ section }}"
      hx-swap="outerHTML"
      id="field-{{ field_name }}">
  {% csrf_token %}
  <input type="hidden" name="field_name" value="{{ field_name }}">
  {% if is_height %}
    <input type="number" name="feet" value="{{ height_feet }}" min="0" autofocus class="w-4"> ft
    <input type="number" step="any" name="inches" value="{{ height_inches }}" min="0" max="11" class="w-4"> in
  {% elif is_pint_split %}
    <input type="number" step="any" name="value" value="{{ pint_magnitude }}" autofocus class="w-6">
    {% if pint_unit_choices %}
      <select name="pint_unit">
        {% for unit_val, unit_label in pint_unit_choices %}
          <option value="{{ unit_val }}" {% if unit_val == pint_unit %}selected{% endif %}>{{ unit_label }}</option>
        {% endfor %}
      </select>
    {% else %}
      <input type="hidden" name="pint_unit" value="{{ pint_unit }}">
      <span>{{ pint_unit_display }}</span>
    {% endif %}
  {% elif field_type == "textarea" %}
    <textarea name="value" rows="3" cols="40" autofocus>{{ current_value|default:"" }}</textarea>
  {% elif field_type == "select" %}
    <select name="value" autofocus>
      <option value="">—</option>
      {% for choice in choices %}
        <option value="{{ choice }}" {% if choice == current_value %}selected{% endif %}>{{ choice }}</option>
      {% endfor %}
    </select>
  {% elif field_type == "number" %}
    <input type="number" name="value" value="{{ current_value|default:"" }}" autofocus class="w-6">
  {% else %}
    <input type="text" name="value" value="{{ current_value|default:"" }}" autofocus class="w-10">
  {% endif %}
  <button type="submit" class="btn btn-small">Save</button>
  <button type="button" class="btn btn-secondary btn-small"
          onclick="this.closest('form').outerHTML='<span class=\'field-unknown\' hx-get=\'/character/{{ character_id }}/edit-field/?field={{ field_name }}\' hx-target=\'#field-{{ field_name }}\' hx-swap=\'outerHTML\' id=\'field-{{ field_name }}\'>{{ current_value|default:"Unknown (click to set)" }}</span>'">
    Cancel
  </button>
</form>
