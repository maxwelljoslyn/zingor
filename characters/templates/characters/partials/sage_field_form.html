<span id="sage-chosen-field">
  <form
    hx-post="{% url 'characters:sage_chosen_field' character.pk %}"
    hx-target="#section-sage"
    hx-swap="outerHTML"
  >
    {% csrf_token %}
    <label>
      Field:
      <select
        name="chosen_field"
        id="sage-field-select"
        hx-get="{% url 'characters:sage_study_options' character.pk %}"
        hx-trigger="change"
        hx-target="#sage-study-select"
        hx-swap="innerHTML"
      >
        {% for field_name in sage_fields.keys %}
          <option value="{{ field_name }}"{% if field_name == initial_field %} selected{% endif %}>
            {{ field_name }}
          </option>
        {% endfor %}
      </select>
    </label>
    <label>
      Study:
      <select name="chosen_study" id="sage-study-select">
        {% for study in initial_studies %}
          <option value="{{ study }}"{% if study == character.chosen_study %} selected{% endif %}>{{ study }}</option>
        {% endfor %}
      </select>
    </label>
    <button type="submit">Save</button>
  </form>
</span>
