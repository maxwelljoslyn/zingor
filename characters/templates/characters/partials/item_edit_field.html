<form class="inline-form"
      hx-post="/item/{{ item.pk }}/update-field/"
      hx-target="#section-inventory"
      hx-swap="outerHTML"
      id="item-{{ item.pk }}-{{ field_name }}">
  {% csrf_token %}
  <input type="hidden" name="field_name" value="{{ field_name }}">
  {% if is_pint_split %}
    <input type="number" step="any" name="value" value="{{ pint_magnitude }}" autofocus style="width: 6rem;">
    {% if pint_unit_choices %}
      <select name="pint_unit">
        {% for unit_val, unit_label in pint_unit_choices %}
          <option value="{{ unit_val }}" {% if unit_val == pint_unit %}selected{% endif %}>{{ unit_label }}</option>
        {% endfor %}
      </select>
    {% else %}
      <input type="hidden" name="pint_unit" value="{{ pint_unit }}">
      <span>{{ pint_unit_display }}</span>
    {% endif %}
  {% else %}
    <input type="text" name="value" value="{{ current_value|default:"" }}" autofocus style="width: 12rem;">
  {% endif %}
  <button type="submit" class="btn btn-small">Save</button>
  <button type="button" class="btn btn-secondary btn-small"
          hx-get="/character/{{ item.owner.pk }}/section/inventory/"
          hx-target="#section-inventory"
          hx-swap="outerHTML">Cancel</button>
</form>
