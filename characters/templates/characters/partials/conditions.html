{% load character_tags %}
<div class="section" id="section-conditions" data-section="conditions">
  <h2>Conditions</h2>
  {% if conditions %}
    {% for cond in conditions %}
      {% include "characters/partials/condition_row.html" %}
    {% endfor %}
  {% else %}
    <p class="empty-note">No active conditions.</p>
  {% endif %}
  {% if is_owner %}
  <form hx-post="/character/{{ character.pk }}/add-condition/"
        hx-target="#section-conditions"
        hx-swap="outerHTML"
        class="inline-form mt-sm">
    {% csrf_token %}
    <select name="modifier_type" required>
      <option value="ability">Ability</option>
      <option value="weight">Weight</option>
      <option value="action_point">Action Point</option>
    </select>
    <input type="text" name="target" placeholder="Target (e.g. strength)" class="w-8">
    <input type="number" name="value" placeholder="Value" class="w-4" required>
    <input type="text" name="source" placeholder="Source" required>
    <select name="scope">
      <option value="">All (no scope)</option>
      <option value="encumbrance">Encumbrance only</option>
    </select>
    <button type="submit" class="btn btn-small">Add</button>
  </form>
  {% endif %}
</div>
