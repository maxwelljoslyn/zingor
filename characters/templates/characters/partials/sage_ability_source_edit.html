<form class="inline-form"
      id="sage-ability-{{ entry.pk }}-source"
      hx-post="{% url 'characters:sage_ability_source' character.pk entry.pk %}"
      hx-target="#sage-ability-{{ entry.pk }}-source"
      hx-swap="outerHTML">
  {% csrf_token %}
  <input type="text" name="source" value="{{ entry.source }}" autofocus class="w-12">
  <button type="submit" class="btn btn-small">Save</button>
  <button type="button" class="btn btn-secondary btn-small"
          hx-get="{% url 'characters:sage_ability_source' character.pk entry.pk %}"
          hx-target="#sage-ability-{{ entry.pk }}-source"
          hx-swap="outerHTML">Cancel</button>
</form>
