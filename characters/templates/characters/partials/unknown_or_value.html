{% if is_set %}
{% if is_owner %}
<span class="field-value clickable" id="field-{{ field_name }}"
      hx-get="/character/{{ character_id }}/edit-field/?field={{ field_name }}"
      hx-target="#field-{{ field_name }}"
      hx-swap="outerHTML">{{ display_value }}</span>
{% else %}
<span class="field-value" id="field-{{ field_name }}">{{ display_value }}</span>
{% endif %}
{% else %}
{% if is_owner %}
<span class="field-unknown"
      id="field-{{ field_name }}"
      hx-get="/character/{{ character_id }}/edit-field/?field={{ field_name }}"
      hx-target="#field-{{ field_name }}"
      hx-swap="outerHTML">
  Unknown (click to set)
</span>
{% else %}
<span class="field-value muted" id="field-{{ field_name }}">—</span>
{% endif %}
{% endif %}
