<form class="inline-form"
      id="sage-ability-{{ entry.pk }}-name"
      hx-post="{% url 'characters:sage_ability_name' character.pk entry.pk %}"
      hx-target="#sage-ability-{{ entry.pk }}-name"
      hx-swap="outerHTML">
  {% csrf_token %}
  <input type="text" name="ability" value="{{ entry.name }}" autofocus class="w-12" required>
  <button type="submit" class="btn btn-small">Save</button>
  <button type="button" class="btn btn-secondary btn-small"
          hx-get="{% url 'characters:sage_ability_name' character.pk entry.pk %}"
          hx-target="#sage-ability-{{ entry.pk }}-name"
          hx-swap="outerHTML">Cancel</button>
</form>
