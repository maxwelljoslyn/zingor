<div id="wiki-modal-inner"
     style="position:fixed;inset:0;background:rgba(0,0,0,0.7);
            display:flex;align-items:center;justify-content:center;z-index:1000;">
  <div style="background:var(--surface);border:1px solid var(--border);
              border-radius:6px;padding:1.5rem;max-width:700px;width:90%;
              max-height:80vh;display:flex;flex-direction:column;gap:0.75rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2 style="color:var(--accent);margin:0;">Wiki Export</h2>
      <button class="btn btn-secondary btn-small"
              onclick="document.getElementById('wiki-modal').innerHTML=''">Close</button>
    </div>
    <textarea id="wiki-export-text"
              readonly
              style="flex:1;min-height:400px;font-family:monospace;
                     font-size:0.85rem;resize:vertical;
                     background:var(--bg);color:var(--text);
                     border:1px solid var(--border);border-radius:4px;padding:0.5rem;">{{ wiki_text }}</textarea>
    <button class="btn"
            onclick="navigator.clipboard.writeText(document.getElementById('wiki-export-text').value).then(function(){var btn=event.target;var orig=btn.textContent;btn.textContent='Copied!';btn.disabled=true;setTimeout(function(){btn.textContent=orig;btn.disabled=false;},1500);});">Copy to Clipboard</button>
  </div>
</div>
