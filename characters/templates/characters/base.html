<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Zingor{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    document.addEventListener('htmx:configRequest', function(event) {
      // Include CSRF token in all HTMX requests
      var csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
      if (csrfToken) {
        event.detail.headers['X-CSRFToken'] = csrfToken.value;
      } else {
        // Fallback: read from cookie
        var cookie = document.cookie.match(/csrftoken=([^ ;]+)/);
        if (cookie) {
          event.detail.headers['X-CSRFToken'] = cookie[1];
        }
      }
    });
  </script>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-alt: #0f3460;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #e94560;
      --accent-hover: #ff6b81;
      --border: #333;
      --success: #4caf50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 1rem; }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header a { color: var(--accent); text-decoration: none; }
    header a:hover { color: var(--accent-hover); }
    nav a { margin-left: 1rem; }
    h1, h2, h3 { margin-bottom: 0.5rem; }
    h1 { color: var(--accent); }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .section h2 {
      font-size: 1.1rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25rem;
      margin-bottom: 0.75rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-muted); font-weight: normal; font-size: 0.85rem; }
    .field-unknown {
      cursor: pointer;
      color: var(--text-muted);
      font-style: italic;
    }
    .field-unknown:hover { color: var(--accent); }
    .field-value { font-weight: bold; }
    input, select, textarea {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
      font-size: 0.9rem;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    button, .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-block;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-small { padding: 0.2rem 0.5rem; font-size: 0.8rem; }
    .btn-danger { background: #c0392b; }
    .btn-danger:hover { background: #e74c3c; }
    .btn-secondary { background: var(--surface-alt); }
    .btn-secondary:hover { background: var(--border); }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    .modifier-positive { color: var(--success); }
    .modifier-negative { color: var(--accent); }
    .inline-form { display: inline-flex; gap: 0.3rem; align-items: center; }
    ul.spell-list { list-style: none; padding: 0; }
    ul.spell-list li { padding: 0.2rem 0; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .flash { padding: 0.5rem; background: var(--surface-alt); border-radius: 4px; margin-bottom: 0.5rem; }
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 0.3rem 0; }
    .item-row + .item-row { border-top: 1px solid var(--border); }
    .contents { margin-left: 1.5rem; border-left: 2px solid var(--border); padding-left: 0.75rem; }
  </style>
</head>
<body>
  {% csrf_token %}
  <header>
    <a href="/">Zingor</a>
    <nav>
      {% if user.is_authenticated %}
        <span>{{ user.username }}</span>
        <a href="/logout/">Logout</a>
      {% else %}
        <a href="/login/">Login</a>
        <a href="/register/">Register</a>
      {% endif %}
    </nav>
  </header>
  <div class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
