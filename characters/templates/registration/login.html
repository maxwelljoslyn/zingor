{% extends "characters/base.html" %}
{% block title %}Login — Zingor{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Login</h1>
  <div class="section">
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="form-error">Invalid username or password.</div>
      {% endif %}
      <div class="mb-md">
        <label for="id_username">Username</label><br>
        <input type="text" name="username" id="id_username" required autofocus class="w-full">
      </div>
      <div class="mb-md">
        <label for="id_password">Password</label><br>
        <input type="password" name="password" id="id_password" required class="w-full">
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <p class="auth-footer">
      <a href="{% url 'characters:password_reset' %}" class="link">Forgot your password?</a>
    </p>
    {% if registration_enabled %}
    <p class="auth-footer">
      No account? <a href="/register/" class="link">Register</a>
    </p>
    {% endif %}
  </div>
</div>
{% endblock %}
