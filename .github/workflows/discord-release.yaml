name: announce-release-to-discord
# Posts release notes to a Discord channel via webhook whenever a release is
# published. The `published` action fires both for a brand-new non-draft
# release and when an existing draft is published (draft -> published) —
# editing an already-published release fires `edited`, which we deliberately
# ignore. Requires the DISCORD_WEBHOOK_URL repo secret (the Discord webhook
# URL); swap that secret's value to retarget a different server/channel.
#
# Can also be run manually (workflow_dispatch) to re-announce a release for
# testing: supply a tag, or leave it blank to use the latest release. Release
# fields are resolved from the tag via `gh release view`, so the automatic and
# manual paths share one code path.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to announce (blank = latest release)"
        required: false
        default: ""

jobs:
  notify:
    name: Post release notes to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -o pipefail
          # Strip any surrounding whitespace/newlines from the secret; a
          # trailing newline pasted into the secret makes curl reject the URL
          # with exit 3 ("URL malformed").
          WEBHOOK="$(printf '%s' "$WEBHOOK" | tr -d '[:space:]')"
          case "$WEBHOOK" in
            https://*) ;;
            *) echo "::error::DISCORD_WEBHOOK_URL is empty or not an https URL" >&2; exit 1 ;;
          esac
          # Resolve release fields from the tag (empty TAG => latest release),
          # so the release-event and manual-dispatch paths behave identically.
          RELEASE_JSON="$(gh release view $TAG --repo "$GITHUB_REPOSITORY" --json name,tagName,url,body,publishedAt)"
          # Discord embed limits: description <= 4096, title <= 256.
          # Reserve headroom for the truncation footer that links to the
          # full notes on GitHub.
          DESC_LIMIT=4000
          printf '%s' "$RELEASE_JSON" \
          | jq --argjson limit "$DESC_LIMIT" --arg repo "$GITHUB_REPOSITORY" '
            (.name // .tagName) as $name
            | .url as $url
            | .publishedAt as $time
            | (.body // "") as $body
            # GitHub auto-linkifies "#123" shorthand only on GitHub; Discord
            # sees plain text, so rewrite each into a real markdown link.
            # The /issues/N path redirects to /pull/N for PRs, so it covers both.
            # Only fire at a real boundary (start, whitespace, or an opening
            # "(" / "[") so a "#123" glued to a URL fragment (MediaWiki TOC
            # anchors, wiki section links) is left untouched; the boundary char
            # is captured in `pre` and re-emitted.
            | ($body | gsub("(?<pre>^|[\\s([])#(?<n>[0-9]+)";
                            .pre + "[#" + .n + "](https://github.com/" + $repo + "/issues/" + .n + ")")) as $linked
            | ($linked | if length > $limit
                       then (.[0:$limit] + "…\n\n[View full release notes](" + $url + ")")
                       else . end) as $desc
            | { embeds: [ { title: ($name | .[0:256]), url: $url,
                            description: $desc, color: 15524814, timestamp: $time } ] }
            ' \
          | curl --fail-with-body -sS -H "Content-Type: application/json" -d @- "$WEBHOOK"
