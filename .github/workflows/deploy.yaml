name: deploy-to-production
# Deploys on every push to master; can also be triggered manually from the
# Actions tab (or `gh workflow run deploy.yaml`). Requires the
# SSH_PRIVATE_KEY and KNOWN_HOSTS repo secrets.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Code to Production
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Deploy to Server
        run: |
          ssh maxwell@maxwelljoslyn.com '/home/maxwell/zingor/deploy.sh'
